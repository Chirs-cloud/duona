<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多拿点 · 后台管理</title>
  <style>
    :root {
      --brand: #8B5CF6; --brand-light: #EDE9FE; --brand-dark: #7C3AED;
      --green: #10B981; --green-light: #ECFDF5;
      --red: #EF4444; --red-light: #FEF2F2;
      --yellow: #FBBF24; --yellow-light: #FFFBEB;
      --bg: #F5F3FF; --card: #FFFFFF;
      --text: #1E1B4B; --text-2: #6B7280; --text-3: #9CA3AF;
      --border: #EDE9FE; --shadow: 0 2px 16px rgba(139,92,246,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* 登录页 */
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: white; border-radius: 20px; padding: 40px 32px; width: 360px; box-shadow: var(--shadow); text-align: center; }
    .login-box h1 { font-size: 22px; font-weight: 800; color: var(--brand); margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: var(--text-2); margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; margin-bottom: 12px; outline: none; }
    .login-box input:focus { border-color: var(--brand); }
    .login-box button { width: 100%; padding: 14px; background: var(--brand); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .login-box button:hover { background: var(--brand-dark); }
    .login-error { color: var(--red); font-size: 13px; margin-top: 8px; }

    /* 主界面 */
    .admin-layout { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }
    .sidebar { background: white; border-right: 1px solid var(--border); padding: 24px 0; }
    .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid var(--border); }
    .sidebar-logo h2 { font-size: 18px; font-weight: 800; color: var(--brand); }
    .sidebar-logo p { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .sidebar-nav { padding: 16px 12px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-2); transition: all 0.15s; margin-bottom: 4px; }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
    .nav-item .icon { font-size: 16px; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); position: absolute; bottom: 0; width: 200px; }
    .sidebar-footer button { font-size: 12px; color: var(--text-3); background: none; border: none; cursor: pointer; }

    .main { padding: 28px 32px; overflow-y: auto; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 22px; font-weight: 800; }
    .page-header p { font-size: 13px; color: var(--text-2); margin-top: 4px; }

    /* 数据卡片 */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: white; border-radius: 16px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .stat-card .label { font-size: 12px; color: var(--text-2); font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .stat-card .value { font-size: 32px; font-weight: 800; color: var(--text); }
    .stat-card .sub { font-size: 12px; color: var(--text-3); margin-top: 4px; }
    .stat-card.brand .value { color: var(--brand); }
    .stat-card.green .value { color: var(--green); }
    .stat-card.yellow .value { color: var(--yellow); }

    /* 表格 */
    .table-card { background: white; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
    .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-header h3 { font-size: 15px; font-weight: 700; }
    .table-header .refresh-btn { font-size: 12px; color: var(--brand); background: var(--brand-light); padding: 6px 14px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 12px; font-weight: 600; color: var(--text-2); text-align: left; padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); }
    td { font-size: 13px; padding: 12px 16px; border-bottom: 1px solid #F9F8FF; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FDFCFF; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge.paid { background: var(--green-light); color: var(--green); }
    .badge.free { background: var(--yellow-light); color: #92400E; }
    .btn-set-paid { font-size: 11px; padding: 4px 10px; background: var(--brand-light); color: var(--brand); border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-set-paid:hover { background: var(--brand); color: white; }

    /* 分页 */
    .pagination { display: flex; gap: 8px; padding: 16px 20px; justify-content: flex-end; align-items: center; border-top: 1px solid var(--border); }
    .pagination button { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; background: white; }
    .pagination button.active { background: var(--brand); color: white; border-color: var(--brand); }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination .page-info { font-size: 13px; color: var(--text-2); }

    /* 加载态 */
    .loading { text-align: center; padding: 40px; color: var(--text-3); font-size: 14px; }
    .empty { text-align: center; padding: 40px; color: var(--text-3); font-size: 14px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1E1B4B; color: white; padding: 10px 20px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all 0.25s; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* 详情弹窗样式 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .detail-modal { background: white; border-radius: 16px; width: 100%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 16px; margin: 0; }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); border: none; font-size: 20px; cursor: pointer; color: var(--text-2); }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .detail-section { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .detail-section:last-child { border-bottom: none; margin-bottom: 0; }
    .detail-section h4 { font-size: 14px; color: var(--text); margin: 0 0 12px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .detail-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-item.full { grid-column: span 2; }
    .detail-item label { font-size: 11px; color: var(--text-3); }
    .detail-item span { font-size: 13px; color: var(--text); }
    .btn-detail { padding: 4px 10px; border-radius: 6px; background: var(--brand-light); color: var(--brand); border: none; font-size: 12px; cursor: pointer; }
    .btn-detail:hover { background: var(--brand); color: white; }
    .ai-result { background: var(--bg); border-radius: 10px; padding: 14px; }
    .score-box { text-align: center; padding: 16px; border-radius: 10px; background: linear-gradient(135deg, var(--brand-light), #EDE9FE); margin-bottom: 12px; }
    .score-box.strong { background: linear-gradient(135deg, #ECFDF5, #D1FAE5); }
    .score-box.good { background: linear-gradient(135deg, #FEF3C7, #FDE68A); }
    .score-box.weak { background: linear-gradient(135deg, #FEF2F2, #FEE2E2); }
    .score-num { font-size: 36px; font-weight: 800; color: var(--brand); }
    .score-label { font-size: 12px; color: var(--text-2); }
    .score-title { font-size: 13px; color: var(--text); margin-top: 6px; }
    .ai-text { font-size: 13px; line-height: 1.7; color: var(--text); margin-top: 10px; }
    .ai-text.reassure { background: var(--brand-light); padding: 10px; border-radius: 8px; color: var(--brand-dark); }
    .qa-item { background: var(--bg); padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    .followup-item { font-size: 12px; color: var(--text-2); line-height: 1.6; padding: 8px; background: var(--bg); border-radius: 8px; }
    .email-box { background: var(--bg); padding: 12px; border-radius: 10px; border-left: 3px solid var(--brand); }
    .email-box pre { white-space: pre-wrap; word-break: break-all; font-family: inherit; font-size: 12px; line-height: 1.7; color: var(--text-2); }
    .market-info { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: var(--text-2); }
    .script-preview { background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .script-header { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
    .script-icon { margin-right: 6px; }
    .script-body { font-size: 12px; line-height: 1.7; color: var(--text-2); max-height: 150px; overflow-y: auto; }
    .chess-list { display: flex; flex-direction: column; gap: 8px; }
    .chess-item { background: var(--bg); padding: 10px; border-radius: 8px; }
    .chess-item b { font-size: 12px; color: var(--brand); }
    .chess-item p { font-size: 12px; color: var(--text-2); margin: 4px 0 0; line-height: 1.6; }
    .strategy-list { display: flex; flex-direction: column; gap: 8px; }
    .strategy-item { font-size: 12px; color: var(--text-2); line-height: 1.6; padding: 8px; background: var(--bg); border-radius: 8px; }
    .strategy-item b { color: var(--text); }
    .tips-list { display: flex; flex-direction: column; gap: 6px; }
    .tip-item { font-size: 12px; color: var(--text-2); line-height: 1.6; }
    .tip-icon { margin-right: 6px; }
    .loading { text-align: center; padding: 20px; color: var(--text-3); }
    .error { text-align: center; padding: 20px; color: var(--red); }
    .empty { text-align: center; padding: 20px; color: var(--text-3); }

    /* 响应式 */
    @media (max-width: 768px) {
      .admin-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- 登录页 -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <h1>🔐 多拿点后台</h1>
    <p>管理员专属，输入密码登录</p>
    <input type="password" id="adminPwd" placeholder="管理员密码" onkeydown="if(event.key==='Enter') adminLogin()" />
    <button onclick="adminLogin()">登 录</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="adminLayout" class="admin-layout" style="display:none;">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h2>多拿点</h2>
      <p>后台管理系统</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="showPage('overview')" id="nav-overview">
        <span class="icon">📊</span> 数据总览
      </div>
      <div class="nav-item" onclick="showPage('users')" id="nav-users">
        <span class="icon">👥</span> 用户管理
      </div>
      <div class="nav-item" onclick="showPage('analyses')" id="nav-analyses">
        <span class="icon">📋</span> 报告记录
      </div>
    </div>
    <div style="position:absolute;bottom:0;width:200px;padding:16px 20px;border-top:1px solid var(--border);">
      <button onclick="adminLogout()" style="font-size:12px;color:var(--text-3);background:none;border:none;cursor:pointer;">退出登录</button>
    </div>
  </div>

  <div class="main">
    <!-- 总览 -->
    <div id="page-overview">
      <div class="page-header">
        <h1>📊 数据总览</h1>
        <p id="overviewTime">加载中...</p>
      </div>
      <div class="stats-grid">
        <div class="stat-card brand">
          <div class="label">👥 累计用户</div>
          <div class="value" id="stat-users">--</div>
          <div class="sub" id="stat-today-users">今日新增 -- 人</div>
        </div>
        <div class="stat-card">
          <div class="label">📋 分析报告</div>
          <div class="value" id="stat-analyses">--</div>
          <div class="sub" id="stat-today-analyses">今日新增 -- 份</div>
        </div>
        <div class="stat-card green">
          <div class="label">💰 付费用户</div>
          <div class="value" id="stat-paid">--</div>
          <div class="sub" id="stat-revenue">预计收入 ¥--</div>
        </div>
      </div>
      <div class="table-card">
        <div class="table-header">
          <h3>最新注册用户</h3>
          <button class="refresh-btn" onclick="loadOverview()">🔄 刷新</button>
        </div>
        <div id="overview-users-table"><div class="loading">加载中...</div></div>
      </div>
    </div>

    <!-- 用户管理 -->
    <div id="page-users" style="display:none;">
      <div class="page-header">
        <h1>👥 用户管理</h1>
        <p>查看所有注册用户，手动设置付费状态</p>
      </div>
      <div class="table-card">
        <div class="table-header">
          <h3>用户列表</h3>
          <button class="refresh-btn" onclick="loadUsers(0)">🔄 刷新</button>
        </div>
        <div id="users-table"><div class="loading">加载中...</div></div>
        <div class="pagination" id="users-pagination"></div>
      </div>
    </div>

    <!-- 报告记录 -->
    <div id="page-analyses" style="display:none;">
      <div class="page-header">
        <h1>📋 报告记录</h1>
        <p>所有用户生成的分析报告</p>
      </div>
      <div class="table-card">
        <div class="table-header">
          <h3>报告列表</h3>
          <button class="refresh-btn" onclick="loadAnalyses(0)">🔄 刷新</button>
        </div>
        <div id="analyses-table"><div class="loading">加载中...</div></div>
        <div class="pagination" id="analyses-pagination"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 报告详情弹窗 -->
<div id="detailModal" class="modal-overlay" style="display:none;">
  <div class="modal-content detail-modal">
    <div class="modal-header">
      <h3>📋 报告详情</h3>
      <button class="modal-close" onclick="closeDetailModal()">×</button>
    </div>
    <div class="modal-body" id="detailContent">
      <div class="loading">加载中...</div>
    </div>
  </div>
</div>

<script>
let adminToken = '';
let usersPage = 0;
let analysesPage = 0;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function adminLogin() {
  const pwd = document.getElementById('adminPwd').value.trim();
  const err = document.getElementById('loginErr');
  if (!pwd) { err.textContent = '请输入密码'; return; }
  // 通过 API 验证
  const res = await fetch(`/api/admin?type=overview`, {
    headers: { 'Authorization': `Bearer ${pwd}` }
  });
  if (res.status === 401) { err.textContent = '密码错误'; return; }
  if (!res.ok) { err.textContent = '连接失败，请检查服务'; return; }
  adminToken = pwd;
  localStorage.setItem('admin_token', pwd);
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminLayout').style.display = 'grid';
  loadOverview();
}

function adminLogout() {
  adminToken = '';
  localStorage.removeItem('admin_token');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminLayout').style.display = 'none';
  document.getElementById('adminPwd').value = '';
}

async function apiFetch(url) {
  const res = await fetch(url, { headers: { 'Authorization': `Bearer ${adminToken}` } });
  if (res.status === 401) { adminLogout(); throw new Error('无权限'); }
  return res.json();
}

function showPage(name) {
  ['overview','users','analyses'].forEach(p => {
    document.getElementById('page-' + p).style.display = 'none';
    document.getElementById('nav-' + p).classList.remove('active');
  });
  document.getElementById('page-' + name).style.display = 'block';
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'overview') loadOverview();
  if (name === 'users') loadUsers(0);
  if (name === 'analyses') loadAnalyses(0);
}

async function loadOverview() {
  try {
    const data = await apiFetch('/api/admin?type=overview');
    document.getElementById('stat-users').textContent = data.total_users || 0;
    document.getElementById('stat-analyses').textContent = data.total_analyses || 0;
    document.getElementById('stat-paid').textContent = data.paid_users || 0;
    document.getElementById('stat-today-users').textContent = `今日新增 ${data.today_users || 0} 人`;
    document.getElementById('stat-today-analyses').textContent = `今日新增 ${data.today_analyses || 0} 份`;
    document.getElementById('stat-revenue').textContent = `预计收入 ¥${((data.paid_users || 0) * 9.9).toFixed(1)}`;
    document.getElementById('overviewTime').textContent = `数据更新于 ${new Date().toLocaleString('zh-CN')}`;
    // 加载最新用户
    const usersData = await apiFetch('/api/admin?type=users&page=0');
    renderUsersTable(usersData.data || [], 'overview-users-table', false);
  } catch(e) { toast('加载失败: ' + e.message); }
}

async function loadUsers(page) {
  usersPage = page;
  document.getElementById('users-table').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await apiFetch(`/api/admin?type=users&page=${page}`);
    renderUsersTable(data.data || [], 'users-table', true);
    renderPagination('users-pagination', page, data.data?.length === 20, loadUsers);
  } catch(e) { toast('加载失败'); }
}

async function loadAnalyses(page) {
  analysesPage = page;
  document.getElementById('analyses-table').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await apiFetch(`/api/admin?type=analyses&page=${page}`);
    renderAnalysesTable(data.data || []);
    renderPagination('analyses-pagination', page, data.data?.length === 20, loadAnalyses);
  } catch(e) { toast('加载失败'); }
}

function renderUsersTable(users, targetId, showActions) {
  const el = document.getElementById(targetId);
  if (users.length === 0) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr>
      <th>手机号</th>
      <th>状态</th>
      <th>本月使用</th>
      <th>注册时间</th>
      ${showActions ? '<th>操作</th>' : ''}
    </tr></thead>
    <tbody>${users.map(u => `
      <tr>
        <td>${maskPhone(u.phone)}</td>
        <td><span class="badge ${u.is_paid ? 'paid' : 'free'}">${u.is_paid ? '已付费' : '免费'}</span></td>
        <td>${u.usage_count || 0} 次</td>
        <td>${fmtDate(u.created_at)}</td>
        ${showActions ? `<td>${!u.is_paid ? `<button class="btn-set-paid" onclick="setPaid('${u.id}')">设为付费</button>` : '<span style="color:var(--text-3);font-size:12px;">已付费</span>'}</td>` : ''}
      </tr>
    `).join('')}</tbody>
  </table>`;
}

function renderAnalysesTable(analyses) {
  const el = document.getElementById('analyses-table');
  if (analyses.length === 0) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr>
      <th>手机号</th>
      <th>公司</th>
      <th>岗位</th>
      <th>城市</th>
      <th>薪资</th>
      <th>生成时间</th>
      <th>操作</th>
    </tr></thead>
    <tbody>${analyses.map(a => `
      <tr>
        <td>${maskPhone(a.phone)}</td>
        <td>${a.company || '--'}</td>
        <td>${a.position || '--'}</td>
        <td>${a.city || '--'}</td>
        <td>¥${(a.salary || 0).toLocaleString()}</td>
        <td>${fmtDate(a.created_at)}</td>
        <td><button class="btn-detail" onclick="showAnalysisDetail('${a.id}')">查看详情</button></td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

function renderPagination(id, page, hasMore, loadFn) {
  const el = document.getElementById(id);
  el.innerHTML = `
    <span class="page-info">第 ${page + 1} 页</span>
    <button ${page === 0 ? 'disabled' : ''} onclick="${loadFn.name}(${page - 1})">← 上一页</button>
    <button class="active">${page + 1}</button>
    <button ${!hasMore ? 'disabled' : ''} onclick="${loadFn.name}(${page + 1})">下一页 →</button>
  `;
}

async function setPaid(userId) {
  if (!confirm('确定将该用户设为付费？')) return;
  try {
    const data = await apiFetch(`/api/admin?type=set_paid&user_id=${userId}`);
    if (data.success) { toast('✅ 已设置为付费用户'); loadUsers(usersPage); }
  } catch(e) { toast('操作失败'); }
}

function maskPhone(phone) {
  if (!phone) return '--';
  return phone.replace(/^(\d{3})\d{4}(\d{4})$/, '$1****$2');
}
function fmtDate(str) {
  if (!str) return '--';
  return new Date(str).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

// 自动登录
window.onload = function() {
  const saved = localStorage.getItem('admin_token');
  if (saved) {
    document.getElementById('adminPwd').value = saved;
    adminLogin();
  }
};

async function showAnalysisDetail(id) {
  const modal = document.getElementById('detailModal');
  const content = document.getElementById('detailContent');
  modal.style.display = 'flex';
  content.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await apiFetch(`/api/admin?type=analysis_detail&id=${id}`);
    renderAnalysisDetail(data.data);
  } catch(e) {
    content.innerHTML = '<div class="error">加载失败</div>';
  }
}

function closeDetailModal() {
  document.getElementById('detailModal').style.display = 'none';
}

function renderAnalysisDetail(a) {
  const content = document.getElementById('detailContent');
  if (!a) { content.innerHTML = '<div class="empty">报告不存在</div>'; return; }
  
  // 解析数据
  let formData = {};
  let aiData = null;
  
  // 解析 form_data（对象或JSON字符串）
  if (a.form_data) {
    formData = typeof a.form_data === 'object' ? a.form_data : (function() {
      try { return JSON.parse(a.form_data); } catch(e) { return {}; }
    })();
  }
  
  // 解析 result，提取 aiData（对象或JSON字符串）
  let aiResult = {};
  if (a.result) {
    aiResult = typeof a.result === 'object' ? a.result : (function() {
      try { return JSON.parse(a.result); } catch(e) { return {}; }
    })();
    if (aiResult.aiData) {
      aiData = aiResult.aiData;
    }
  }
  
  let html = '<div class="detail-section">';
  html += '<h4>基本信息</h4>';
  html += '<div class="detail-grid">';
  html += `<div class="detail-item"><label>手机号</label><span>${maskPhone(a.phone)}</span></div>`;
  html += `<div class="detail-item"><label>公司</label><span>${a.company || '--'}</span></div>`;
  html += `<div class="detail-item"><label>岗位</label><span>${a.position || '--'}</span></div>`;
  html += `<div class="detail-item"><label>城市</label><span>${a.city || '--'}</span></div>`;
  html += `<div class="detail-item"><label>薪资</label><span>¥${(a.salary || 0).toLocaleString()}</span></div>`;
  html += `<div class="detail-item"><label>生成时间</label><span>${fmtDate(a.created_at)}</span></div>`;
  html += '</div></div>';
  
  // 表单数据
  if (formData && Object.keys(formData).length > 0) {
    html += `<div class="detail-section">
      <h4>📝 用户填写的表单数据</h4>
      <div class="detail-grid">`;
    if (formData.target) html += `<div class="detail-item"><label>期望月薪</label><span>¥${formData.target.toLocaleString()}</span></div>`;
    if (formData.exp) html += `<div class="detail-item"><label>工作年限</label><span>${formData.exp}</span></div>`;
    if (formData.edu) html += `<div class="detail-item"><label>学历</label><span>${formData.edu}</span></div>`;
    if (formData.structure && formData.structure.length) html += `<div class="detail-item"><label>薪资结构</label><span>${formData.structure.join(', ')}</span></div>`;
    if (formData.adv && formData.adv.length) html += `<div class="detail-item"><label>个人优势</label><span>${formData.adv.join(', ')}</span></div>`;
    if (formData.concern && formData.concern.length) html += `<div class="detail-item"><label>顾虑</label><span>${formData.concern.join(', ')}</span></div>`;
    if (formData.stage) html += `<div class="detail-item"><label>进展阶段</label><span>${formData.stage}</span></div>`;
    if (formData.hrmood) html += `<div class="detail-item"><label>HR态度</label><span>${formData.hrmood}</span></div>`;
    if (formData.note) html += `<div class="detail-item full"><label>补充说明</label><span>${formData.note}</span></div>`;
    html += `</div></div>`;
  }
  
  // AI分析结果 - 使用 aiData（和前端完全一致）
  if (aiData) {
    // 评分展示
    const score = aiData.score || aiResult.score;
    const scoreTitle = aiData.scoreTitle || '';
    const scoreDesc = aiData.scoreDesc || '';
    if (score !== undefined) {
      const scoreLevel = score >= 75 ? 'strong' : score >= 50 ? 'good' : 'weak';
      html += `<div class="detail-section">
        <h4>💡 谈判力分析</h4>
        <div class="ai-result">
        <div class="score-box ${scoreLevel}">
          <div class="score-num">${score}</div>
          <div class="score-label">谈判力评分</div>
          ${scoreTitle ? `<div class="score-title">${scoreTitle}</div>` : ''}
          ${scoreDesc ? `<div class="score-label" style="margin-top:4px;">${scoreDesc}</div>` : ''}
        </div>`;
      
      // 市场薪资区间
      const marketMin = aiData.marketMin || aiResult.min;
      const marketMid = aiData.marketMid || aiResult.mid;
      const marketMax = aiData.marketMax || aiResult.max;
      if (marketMin || marketMid || marketMax) {
        html += `<div class="market-info">
          <span>📊 市场薪资</span>
          ${marketMin ? `<span>¥${marketMin.toLocaleString()}</span>` : ''}
          ${marketMid ? `<span>中位 ¥${marketMid.toLocaleString()}</span>` : ''}
          ${marketMax ? `<span>¥${marketMax.toLocaleString()}</span>` : ''}
        </div>`;
      }
      
      // 评估
      if (aiData.assessment) html += `<div class="ai-text">${aiData.assessment}</div>`;
      if (aiData.reassure) html += `<div class="ai-text reassure">💬 ${aiData.reassure}</div>`;
      
      // HR心理分析（前端格式）
      if (aiData.hrPsychology) {
        const hp = aiData.hrPsychology;
        html += `<div class="ai-text" style="background:#FEF3C7;margin-top:10px;">
          <b>👤 HR心理分析：</b>${hp.likelyPloy || ''}
          <br><b>→ 你的反制：</b>${hp.yourCounter || ''}
        </div>`;
      }
      html += `</div></div>`;
    }
    
    // 话术脚本
    if (aiData.scripts && aiData.scripts.length > 0) {
      html += `<div class="detail-section">
        <h4>💬 话术脚本</h4>`;
      aiData.scripts.forEach((s, i) => {
        const tagClass = s.tag === 'reco' ? 'reco' : s.tag === 'safe' ? 'safe' : 'res';
        html += `<div class="script-preview">
          <div class="script-header">
            <span class="script-icon">${s.icon || '💬'}</span>
            ${s.name || ('方案' + (i+1))}
            ${s.tagTxt ? `<span class="badge ${tagClass}" style="margin-left:auto;font-size:11px;padding:2px 8px;border-radius:10px;">${s.tagTxt}</span>` : ''}
          </div>
          <div class="script-body">${(s.body || '').replace(/\n/g, '<br>')}</div>
        </div>`;
      });
      html += `</div>`;
    }
    
    // 谈判筹码
    if (aiData.chess && aiData.chess.length > 0) {
      html += `<div class="detail-section">
        <h4>🎯 谈判筹码</h4>
        <div class="chess-list">`;
      aiData.chess.forEach(c => {
        html += `<div class="chess-item">
          <div class="chess-title" style="font-size:13px;color:var(--brand);font-weight:600;">${c.title || ''}</div>
          <div class="chess-desc" style="font-size:12px;color:var(--text-2);margin-top:4px;">${c.desc || ''}</div>
        </div>`;
      });
      html += `</div></div>`;
    }
    
    // 谈判策略（保姆级）
    if (aiData.battlePlan) {
      const bp = aiData.battlePlan;
      let strategyHtml = '';
      if (bp.phase1) strategyHtml += `<div class="strategy-item"><b>📋 谈判前48小时：</b>${bp.phase1}</div>`;
      if (bp.phase2) strategyHtml += `<div class="strategy-item"><b>🎯 开口时刻：</b>${bp.phase2}</div>`;
      if (bp.phase3) strategyHtml += `<div class="strategy-item"><b>🛡️ 被拒后反击：</b>${bp.phase3}</div>`;
      if (strategyHtml) {
        html += `<div class="detail-section">
          <h4>🎯 保姆级谈判策略</h4>
          <div class="strategy-list">${strategyHtml}</div>
        </div>`;
      }
    }
    
    // Q&A
    if (aiData.qa && aiData.qa.length > 0) {
      html += `<div class="detail-section">
        <h4>❓ 常见问题Q&A</h4>
        <div class="chess-list">`;
      aiData.qa.forEach(q => {
        html += `<div class="chess-item">
          <div style="font-size:13px;"><b style="color:var(--brand);">❓ ${q.q || q.question || ''}</b></div>
          <div style="font-size:12px;color:var(--text-2);margin-top:6px;"><b style="color:var(--green);">💡 回答：</b>${q.a || q.answer || ''}</div>
        </div>`;
      });
      html += `</div></div>`;
    }
    
    // 跟进策略
    if (aiData.followup) {
      const fu = aiData.followup;
      let followupHtml = '';
      if (fu.sameDay || fu.sameday) followupHtml += `<div class="strategy-item"><b>📌 当天：</b>${fu.sameDay || fu.sameday}</div>`;
      if (fu.noReply || fu.waiting) followupHtml += `<div class="strategy-item"><b>⏳ 1-3天未回复：</b>${fu.noReply || fu.waiting}</div>`;
      if (fu.deadline) followupHtml += `<div class="strategy-item"><b>⏰ Deadline处理：</b>${fu.deadline}</div>`;
      if (followupHtml) {
        html += `<div class="detail-section">
          <h4>📅 谈判后跟进策略</h4>
          <div class="strategy-list">${followupHtml}</div>
        </div>`;
      }
    }
    
    // 注意事项
    if (aiData.tips && aiData.tips.length > 0) {
      html += `<div class="detail-section">
        <h4>⚠️ 注意事项</h4>
        <div class="tips-list">`;
      aiData.tips.forEach(t => {
        html += `<div class="tip-item">
          <span class="tip-icon">${t.icon || '•'}</span>
          <div>
            <div style="font-weight:600;font-size:13px;">${t.title || ''}</div>
            <div style="font-size:12px;color:var(--text-2);margin-top:2px;">${t.desc || ''}</div>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }
  } else if (aiResult && (aiResult.score !== undefined || aiResult.min !== undefined)) {
    // 旧版数据：只有基础评分数据
    const score = aiResult.score || 0;
    const scoreLevel = score >= 72 ? 'strong' : score >= 46 ? 'good' : 'weak';
    html += `<div class="detail-section">
      <h4>💡 谈判力分析</h4>
      <div class="ai-result">
      <div class="score-box ${scoreLevel}">
        <div class="score-num">${score}</div>
        <div class="score-label">谈判力评分</div>
      </div>
      <div class="market-info">
        <span>📊 市场薪资区间</span>
        ${aiResult.min ? `<span>¥${aiResult.min.toLocaleString()}</span>` : ''}
        ${aiResult.mid ? `<span>中位 ¥${aiResult.mid.toLocaleString()}</span>` : ''}
        ${aiResult.max ? `<span>¥${aiResult.max.toLocaleString()}</span>` : ''}
      </div>
      </div></div>`;
  } else {
    // 没有任何AI数据，显示调试信息
    html += `<div class="detail-section">
      <h4>⚠️ 原始数据（调试用）</h4>
      <div style="background:#f5f5f5;padding:10px;border-radius:8px;font-size:12px;word-break:break-all;">
        <b>result字段：</b><pre style="margin:5px 0 0;white-space:pre-wrap;">${JSON.stringify(aiResult || {}, null, 2).substring(0, 1000)}</pre>
      </div>
    </div>`;
  }
  
  content.innerHTML = html;
}

// 关闭弹窗
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('modal-overlay')) {
    closeDetailModal();
  }
});
</script>
</body>
</html>
